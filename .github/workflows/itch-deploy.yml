name: Deploy to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  ITCH_USER: mariamarab
  ITCH_GAME: special-delivery
  ITCH_CHANNEL: web

jobs:
  deploy-web:
    name: Export web build and push to itch.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 godot
          chmod +x godot
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Install Godot export templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Export web build
        run: |
          mkdir -p export
          godot --headless --export-release "Web" export/index.html

      - name: Install butler
        run: |
          curl -sL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push export "${ITCH_USER}/${ITCH_GAME}:${ITCH_CHANNEL}" \
            --userversion-file <(git rev-parse --short HEAD)
